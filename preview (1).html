<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    header a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      background: url('https://via.placeholder.com/1200x400') center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .btn {
      background: green;
      color: white;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .productos {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      background: #f5f5f5;
    }

    .producto {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <h2>Mi Tienda</h2>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <h1>Bienvenido a mi tienda 🛍️</h1>
  <p>Los mejores productos al mejor precio</p>
  <button class="btn">Comprar ahora</button>
</section>

<section class="productos">
  <div class="producto">
    <h3>Producto 1</h3>
    <p>$10</p>
  </div>

  <div class="producto">
    <h3>Producto 2</h3>
    <p>$15</p>
  </div>

  <div class="producto">
    <h3>Producto 3</h3>
    <p>$20</p>
  </div>
</section>

<footer>
  <p>© 2026 Mi Tienda</p>
</footer>

</body>
</html>
